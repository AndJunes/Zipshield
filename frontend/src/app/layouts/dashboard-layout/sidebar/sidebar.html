<aside class="flex h-full w-64 shrink-0 flex-col bg-color2 text-color5">
  <div class="flex h-16 items-center px-6 text-lg font-semibold tracking-wide">
    Zipshield
  </div>

  <nav class="flex-1 overflow-y-auto px-3 py-4">
    <ul class="flex flex-col gap-1">
      @for (item of visibleItems(); track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-color4/20 text-color4"
            [routerLinkActiveOptions]="{ exact: !!item.exact }"
            class="flex items-center gap-3 rounded-md px-3 py-2 text-sm text-color3 transition-colors hover:bg-color4/10 hover:text-color5"
          >
            <span>{{ item.label }}</span>
          </a>
        </li>
      } @empty {
        <li class="px-3 py-2 text-xs text-color3">
          Sin elementos en el menú
        </li>
      }
    </ul>
  </nav>

  <div class="border-t border-color3/20 px-6 py-4 text-xs text-color3">
    v0.0.0
  </div>
</aside>
