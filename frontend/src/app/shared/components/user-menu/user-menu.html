@if (user(); as u) {
  <div class="relative">
    <button
      type="button"
      (click)="toggle()"
      class="group flex items-center gap-2 rounded-full border border-color3/15 bg-white p-0.5 pr-3 shadow-sm transition-shadow hover:shadow-md"
      [class.shadow-md]="open()"
      aria-haspopup="menu"
      [attr.aria-expanded]="open()"
    >
      <img
        [src]="u.photoUrl"
        [alt]="u.firstName + ' ' + u.lastName"
        class="h-9 w-9 rounded-full object-cover"
      />
      <span class="hidden text-sm font-medium text-color2 sm:inline">
        {{ u.firstName }}
      </span>
      <svg
        viewBox="0 0 12 12"
        width="10"
        height="10"
        class="text-color3 transition-transform"
        [class.rotate-180]="open()"
        aria-hidden="true"
      >
        <path d="M2 4 L6 8 L10 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>

    @if (open()) {
      <div
        role="menu"
        class="absolute right-0 top-full z-50 mt-2 w-64 origin-top-right overflow-hidden rounded-xl border border-color3/15 bg-white shadow-lg"
      >
        <div class="flex items-center gap-3 border-b border-color3/15 p-4">
          <img [src]="u.photoUrl" [alt]="u.firstName" class="h-12 w-12 rounded-full object-cover" />
          <div class="flex flex-1 flex-col min-w-0">
            <span class="truncate text-sm font-semibold text-color2">
              {{ u.firstName }} {{ u.lastName }}
            </span>
            <span class="truncate text-xs text-color3">{{ u.email }}</span>
            <span class="mt-1 inline-flex w-fit items-center rounded-full bg-color4/30 px-2 py-0.5 text-[10px] font-medium text-color2">
              {{ roleLabel(u.role) }}
            </span>
          </div>
        </div>

        <nav class="flex flex-col py-1">
          <a
            routerLink="/profile"
            (click)="close()"
            class="flex items-center justify-between px-4 py-2.5 text-sm text-color2 transition-colors hover:bg-color5"
            role="menuitem"
          >
            <span>Perfil</span>
            <span class="text-color3">›</span>
          </a>
          <a
            routerLink="/settings"
            (click)="close()"
            class="flex items-center justify-between px-4 py-2.5 text-sm text-color2 transition-colors hover:bg-color5"
            role="menuitem"
          >
            <span>Configuración</span>
            <span class="text-color3">›</span>
          </a>
        </nav>

        <div class="border-t border-color3/15">
          <button
            type="button"
            (click)="logout()"
            class="flex w-full items-center justify-between px-4 py-2.5 text-sm font-medium text-color2 transition-colors hover:bg-color4/20"
            role="menuitem"
          >
            <span>Cerrar sesión</span>
            <span class="text-color3">↪</span>
          </button>
        </div>
      </div>
    }
  </div>
}
